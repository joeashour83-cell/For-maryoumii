
<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>To Mariam ❤️</title>
<style>
body{margin:0;font-family:sans-serif;background:#ffd6e7;overflow:hidden;display:flex;justify-content:center;align-items:center;height:100vh}
#env{width:240px;height:150px;position:relative;cursor:pointer}
.base{position:absolute;bottom:0;width:100%;height:100px;background:#fff;border-radius:0 0 8px 8px}
.flap{position:absolute;top:0;border-left:120px solid transparent;border-right:120px solid transparent;border-top:75px solid #f8f8f8;transform-origin:top;transition:1s}
.open .flap{transform:rotateX(180deg)}
.letter{position:absolute;left:10px;right:10px;bottom:20px;height:0;background:#fff;border-radius:8px;overflow:auto;transition:1s;padding:0}
.open .letter{height:280px;padding:15px}
.heart{position:fixed;color:#ff4d88;animation:fall 5s linear forwards}
@keyframes fall{from{transform:translateY(-20px)}to{transform:translateY(110vh)}}
</style></head><body>
<div id="env"><div class="flap"></div><div class="base"></div>
<div class="letter"><h3>  To Mariam ❤️</h3><p>يا مريم... يمكن أكون غلطت، ويمكن زعلتك، بس والله عمري ما قصدت أكون سبب في ضيقتك.
انتي راحتي وأجمل حاجة في حياتي. حقك عليا، بحبك اوييييييي ، ووحشتيني اويييييي. ❤️</p>
<button onclick="alert('شكراً إنك ادتيني فرصة.. بحبك يا مريومتي  ❤️')">تسامحيني؟❤️</button></div></div>
<script>
let o=false,e=document.getElementById('env');
e.onclick=()=>{if(o)return;o=true;e.classList.add('open');
setInterval(()=>{let h=document.createElement('div');h.className='heart';h.textContent='❤';
h.style.left=Math.random()*100+'vw';h.style.fontSize=(20+Math.random()*20)+'px';
document.body.appendChild(h);setTimeout(()=>h.remove(),5000);},180);}
</script></body></html>
